site_name: Pensamiento Computacional y Testing de Aplicaciones 2026
site_author: Maximiliano Nuñez

theme:
  name: material
  favicon: assets/images/favicon.ico
  logo: assets/images/favicon.ico
  palette:
    - scheme: default
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode

  features: content.code.copy
  
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets



nav:
  - 🏠​ Inicio: index.md
  - 📅 Cronograma del curso: cronograma.md
  - 📚 Clases: 
    - 📝 Índice: clases/clases.md
    - 🧑‍🏫 Introducción: clases/01_introduccion.md
    - 🧑‍💻 ¿Qué es programar?: clases/02_que_es_programar.md
    - 💽​ Instalación:
      - 🐍 Python: instalacion/instalar_python.md
      - 🧑‍💻 Visual Studio Code: instalacion/instalar_vscode.md
      - 🪾​ Git: instalacion/instalar_git.md